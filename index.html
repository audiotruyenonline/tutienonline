<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Truyện Online</title>
  <meta name="theme-color" content="#090a12" />
  <style>
    :root{
      --bg:#090a12;
      --panel:#0f111b;
      --panel-2:#131727;
      --line:rgba(255,255,255,.08);
      --text:#e8ecff;
      --muted:#9aa3c7;
      --gold:#f2be2d;
      --gold-2:#c88a07;
      --cyan:#00d4ff;
      --green:#0be881;
      --purple:#7c4dff;
      --danger:#ff4d6d;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
      --radius-lg:20px;
      --header-h:62px;
      --bottom-nav-h:68px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:radial-gradient(circle at 50% -20%, #1a1432 0%, #0b0c15 35%, var(--bg) 70%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    button{font:inherit}

    .app{
      min-height:100vh;
      padding-top:calc(env(safe-area-inset-top) + var(--header-h));
      padding-bottom:calc(env(safe-area-inset-bottom) + var(--bottom-nav-h) + 16px);
      max-width:560px;
      margin:0 auto;
      position:relative;
    }

    /* Header */
    .topbar{
      position:fixed; top:0; left:0; right:0; z-index:50;
      height:calc(env(safe-area-inset-top) + var(--header-h));
      padding-top:env(safe-area-inset-top);
      background:linear-gradient(180deg, rgba(7,8,14,.98), rgba(7,8,14,.9));
      border-bottom:1px solid rgba(255,255,255,.04);
      backdrop-filter: blur(8px);
    }
    .topbar-inner{
      height:var(--header-h);
      max-width:560px;
      margin:0 auto;
      padding:0 10px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .brand{
      display:flex; align-items:center; gap:8px; min-width:0;
      padding:8px 10px; border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border:1px solid rgba(255,255,255,.06);
    }
    .brand-logo{
      width:22px;height:22px;border-radius:6px;
      background:linear-gradient(135deg,#ff3b30,#ffcc00);
      box-shadow:0 0 18px rgba(255,195,0,.25);
      position:relative;
    }
    .brand-logo::after{
      content:"T"; position:absolute; inset:0; display:grid; place-items:center;
      color:#121212; font-weight:900; font-size:12px;
    }
    .brand-name{
      font-weight:800; letter-spacing:.2px; white-space:nowrap;
    }
    .brand-name span{color:var(--gold)}

    .icon-btn{
      width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.07);
      background:linear-gradient(180deg,#111423,#0d101c);
      color:#eaefff; display:grid; place-items:center; cursor:pointer;
      position:relative; flex:0 0 auto;
    }
    .icon-btn svg{width:18px;height:18px;opacity:.95}
    .badge-dot{
      position:absolute; top:-3px; right:-3px;
      min-width:18px;height:18px;padding:0 5px;border-radius:999px;
      display:grid;place-items:center; font-size:10px; font-weight:800;
      background:#ff3b30;color:white; border:2px solid #0b0c15;
    }
    .pill{
      height:38px;border-radius:14px;padding:0 12px;border:1px solid rgba(255,255,255,.07);
      background:linear-gradient(180deg,#151930,#0e1120);
      color:#dfe7ff; display:flex; align-items:center; gap:7px; cursor:pointer;
      white-space:nowrap; font-weight:700;
    }
    .pill .coin{
      width:16px;height:16px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #fff7c4, #f3b308 55%, #9a6300);
      box-shadow:0 0 12px rgba(243,179,8,.25);
      display:inline-block;
    }
    .pill.gold{
      background:linear-gradient(180deg, #f1c23a, #c98a08);
      color:#201500; border-color:rgba(255,220,120,.3);
      box-shadow:0 8px 20px rgba(201,138,8,.2);
    }

    .spacer{flex:1}
    .avatar{
      width:38px;height:38px;border-radius:50%;
      border:2px solid rgba(255,255,255,.12);
      background:linear-gradient(135deg,#5b8cff,#9f68ff);
      display:grid;place-items:center; font-weight:800;
      overflow:hidden;
    }
    .avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-wrap{
      display:flex; align-items:center; gap:6px;
      padding:4px 6px 4px 4px;
      border:1px solid rgba(255,255,255,.07);
      border-radius:16px;
      background:linear-gradient(180deg,#121526,#0d101d);
      cursor:pointer;
    }
    .caret{opacity:.7}

    /* Sections */
    .page{padding:10px 12px 0}
    .section{margin-top:12px}
    .section-head{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; margin-bottom:10px;
    }
    .section-title{
      display:flex; align-items:center; gap:8px; font-size:17px; font-weight:900;
      letter-spacing:.2px;
    }
    .section-title .bubble{
      width:28px;height:28px;border-radius:10px; display:grid; place-items:center;
      background:linear-gradient(180deg,#181d31,#111626);
      border:1px solid rgba(255,255,255,.06);
      color:var(--gold);
      box-shadow: inset 0 0 12px rgba(255,193,7,.05);
    }
    .section-desc{
      color:var(--muted); font-size:13px; margin:-4px 0 10px;
    }
    .btn-link{
      height:34px; padding:0 12px; border-radius:999px;
      border:1px solid rgba(255,200,40,.18);
      background:linear-gradient(180deg, rgba(242,190,45,.16), rgba(242,190,45,.05));
      color:#ffe39a; font-weight:700; display:flex; align-items:center; gap:6px;
    }
    .live-pill{
      font-size:11px; font-weight:800; letter-spacing:.3px;
      color:#eafff2; display:inline-flex; align-items:center; gap:6px;
      padding:4px 9px; border-radius:999px;
      border:1px solid rgba(11,232,129,.22);
      background:rgba(11,232,129,.08);
    }
    .live-dot{
      width:7px;height:7px;border-radius:50%; background:var(--green);
      box-shadow:0 0 10px rgba(11,232,129,.8);
    }

    /* Horizontal cards (Đang đọc) */
    .h-scroll{
      display:flex; gap:10px; overflow:auto; padding-bottom:4px;
      scroll-snap-type:x proximity;
    }
    .h-scroll::-webkit-scrollbar{height:0}
    .story-card{
      flex:0 0 118px; width:118px;
      border-radius:16px; overflow:hidden;
      background:linear-gradient(180deg,#121524,#0d101b);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
      scroll-snap-align:start;
      position:relative;
    }
    .cover-wrap{
      position:relative; aspect-ratio: 3 / 4;
      background:#111;
      overflow:hidden;
    }
    .cover-wrap img{width:100%;height:100%;object-fit:cover}
    .cover-overlay{
      position:absolute; inset:auto 0 0 0; padding:8px;
      background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.65) 55%, rgba(0,0,0,.88));
    }
    .mini-read-btn{
      width:100%; height:26px; border:none; border-radius:8px;
      background:linear-gradient(180deg,#f1c33c,#ca8c09);
      color:#231600; font-size:12px; font-weight:900; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:5px;
      box-shadow:0 6px 14px rgba(202,140,9,.28);
    }
    .mini-read-btn .tri{
      width:0;height:0;border-left:7px solid #2d1c00;border-top:4px solid transparent;border-bottom:4px solid transparent;
    }
    .story-meta{padding:8px}
    .story-title{
      font-size:12px; font-weight:800; line-height:1.3;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
      overflow:hidden; min-height:31px;
    }

    /* Random discover grid */
    .action-row{
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      margin-bottom:10px;
    }
    .btn-random{
      height:38px; padding:0 14px; border-radius:999px; border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,#15182a,#0e1220); color:#f1f4ff;
      display:flex; align-items:center; gap:8px; font-weight:800;
      cursor:pointer;
    }
    .timer-pill{
      height:34px; padding:0 11px; border-radius:999px;
      border:1px solid rgba(255,200,40,.15);
      background:rgba(242,190,45,.08);
      color:#f7d87a; display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px;
    }
    .timer-dot{
      width:9px;height:9px;border-radius:50%; background:#f2be2d; box-shadow:0 0 10px rgba(242,190,45,.7);
    }

    .grid-cards{
      display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:10px;
    }
    @media (min-width:420px){
      .grid-cards{grid-template-columns:repeat(4, minmax(0,1fr))}
    }

    .grid-card{
      min-width:0;
      border-radius:14px; overflow:hidden;
      border:1px solid rgba(255,255,255,.06);
      background:linear-gradient(180deg,#121524,#0d101b);
      box-shadow:var(--shadow);
      cursor:pointer;
    }
    .grid-card .cover-wrap{aspect-ratio: 3 / 4}
    .grid-body{padding:7px 8px 8px}
    .grid-title{
      font-weight:800; font-size:12px; line-height:1.25;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
      min-height:30px;
    }
    .grid-author{
      margin-top:4px; color:var(--muted); font-size:11px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .stats{
      margin-top:5px; display:flex; align-items:center; gap:8px;
      color:#cdd5f9; font-size:11px;
    }
    .star{color:#ffd34d; font-weight:800}

    /* Updated list */
    .updated-list{
      display:flex; flex-direction:column; gap:10px;
    }
    .updated-item{
      display:flex; gap:10px; align-items:flex-start;
      border-radius:14px; border:1px solid rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)),
        linear-gradient(180deg,#121524,#0d101b);
      padding:10px;
      box-shadow:var(--shadow);
      cursor:pointer;
    }
    .updated-thumb{
      width:64px; aspect-ratio:3/4; border-radius:10px; overflow:hidden; flex:0 0 64px;
      border:1px solid rgba(255,255,255,.07);
      background:#111;
    }
    .updated-thumb img{width:100%;height:100%;object-fit:cover}
    .updated-main{min-width:0; flex:1}
    .updated-title{
      font-size:15px; font-weight:900; line-height:1.3;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
      margin-bottom:4px;
    }
    .updated-sub{
      color:#d6ddff; font-size:13px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .updated-sub .label{color:var(--muted)}
    .updated-line{
      margin-top:4px; color:var(--muted); font-size:12px;
      display:flex; flex-wrap:wrap; gap:8px;
    }
    .updated-line b{color:#ffd866}
    .row-actions{
      display:flex; align-items:center; gap:6px; margin-top:7px;
    }
    .chip{
      height:28px; padding:0 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,#15192b,#0e1220); color:#eff3ff;
      font-size:12px; font-weight:800; display:inline-flex; align-items:center; gap:6px;
      cursor:pointer;
    }
    .chip.follow.active{
      border-color:rgba(242,190,45,.22);
      background:linear-gradient(180deg, rgba(242,190,45,.2), rgba(242,190,45,.08));
      color:#ffe7a8;
    }

    /* Floating right buttons */
    .floating-stack{
      position:fixed;
      right:max(12px, env(safe-area-inset-right));
      bottom:calc(env(safe-area-inset-bottom) + var(--bottom-nav-h) + 20px);
      z-index:35;
      display:flex; flex-direction:column; gap:10px;
      pointer-events:none;
    }
    .float-btn{
      pointer-events:auto;
      min-width:58px;height:42px; padding:0 12px;
      border-radius:16px; border:1px solid rgba(255,255,255,.08);
      display:flex; align-items:center; justify-content:center; gap:8px;
      color:white; font-weight:900;
      box-shadow:0 14px 24px rgba(0,0,0,.32);
      cursor:pointer;
    }
    .float-btn.purple{background:linear-gradient(180deg,#7b4dff,#5b2bd8)}
    .float-btn.gold{background:linear-gradient(180deg,#f1c33b,#c98b08); color:#201500}
    .float-btn .bubble-count{
      min-width:18px;height:18px;border-radius:999px;background:rgba(255,255,255,.2);
      display:grid;place-items:center;font-size:11px;padding:0 5px
    }

    /* Bottom nav */
    .bottom-nav{
      position:fixed; left:0; right:0; bottom:0; z-index:40;
      padding-bottom:env(safe-area-inset-bottom);
      background:linear-gradient(180deg, rgba(9,10,18,.2), rgba(9,10,18,.9) 35%, rgba(9,10,18,.98));
      border-top:1px solid rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
    }
    .bottom-nav-inner{
      max-width:560px; margin:0 auto; height:var(--bottom-nav-h);
      display:flex; align-items:center; justify-content:space-around;
      padding:0 8px;
    }
    .nav-item{
      width:54px; height:54px; border-radius:16px;
      display:grid; place-items:center; color:#cad3ff; cursor:pointer;
      position:relative;
    }
    .nav-item.active{
      color:#f4fffa;
      background:linear-gradient(180deg, rgba(11,232,129,.12), rgba(11,232,129,.05));
      border:1px solid rgba(11,232,129,.18);
    }
    .nav-item svg{width:22px;height:22px}
    .home-pill{
      width:58px; height:58px; border-radius:18px;
      display:grid; place-items:center;
      background:linear-gradient(180deg,#181d31,#101423);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 22px rgba(0,0,0,.35);
      margin-top:-12px;
    }
    .home-pill.active{
      background:linear-gradient(180deg, rgba(242,190,45,.3), rgba(242,190,45,.1)), linear-gradient(180deg,#181d31,#101423);
      border-color:rgba(242,190,45,.28);
      color:#ffe8a7;
    }

    /* Modal */
    .modal{
      position:fixed; inset:0; z-index:80;
      background:rgba(3,4,8,.6);
      backdrop-filter:blur(6px);
      display:none; align-items:flex-end;
    }
    .modal.show{display:flex}
    .sheet{
      width:min(560px,100%);
      margin:0 auto;
      background:linear-gradient(180deg,#14182a,#0d111d);
      border-top-left-radius:22px; border-top-right-radius:22px;
      border:1px solid rgba(255,255,255,.07);
      padding:12px;
      box-shadow:0 -20px 40px rgba(0,0,0,.45);
      animation:sheetUp .18s ease-out;
    }
    @keyframes sheetUp{
      from{transform:translateY(16px); opacity:.5}
      to{transform:translateY(0); opacity:1}
    }
    .sheet-handle{
      width:46px; height:5px; border-radius:999px; background:rgba(255,255,255,.14);
      margin:2px auto 12px;
    }
    .sheet-row{display:flex; gap:12px}
    .sheet-cover{
      width:110px; aspect-ratio:3/4; border-radius:14px; overflow:hidden; background:#111;
      border:1px solid rgba(255,255,255,.08); flex:0 0 110px;
    }
    .sheet-cover img{width:100%;height:100%;object-fit:cover}
    .sheet-main{min-width:0; flex:1}
    .sheet-title{font-size:17px; font-weight:900; line-height:1.3}
    .sheet-author{margin-top:6px; color:var(--muted); font-size:13px}
    .sheet-desc{
      margin-top:8px; color:#d4dcff; font-size:13px; line-height:1.4;
      display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;
    }
    .sheet-actions{
      display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;
    }
    .btn{
      height:38px; padding:0 14px; border-radius:12px; border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,#151a2c,#0e1220); color:#eef2ff; font-weight:800; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn.gold{
      background:linear-gradient(180deg,#f1c33b,#c98b08); color:#241700;
      border-color:rgba(255,220,120,.25);
      box-shadow:0 8px 18px rgba(201,139,8,.22);
    }
    .btn.follow.active{
      border-color:rgba(242,190,45,.22);
      background:linear-gradient(180deg, rgba(242,190,45,.2), rgba(242,190,45,.08));
      color:#ffe7a8;
    }

    /* Panels / utility */
    .panel{
      border-radius:16px; border:1px solid rgba(255,255,255,.06);
      background:linear-gradient(180deg,#121524,#0d101b);
      padding:12px;
      box-shadow:var(--shadow);
    }
    .auth-panel{
      display:flex; align-items:center; gap:10px; justify-content:space-between;
      margin-top:4px;
    }
    .auth-left{display:flex; align-items:center; gap:10px; min-width:0}
    .auth-text{min-width:0}
    .auth-text .name{font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .auth-text .sub{font-size:12px; color:var(--muted)}

    .toast-wrap{
      position:fixed; left:0; right:0; bottom:calc(env(safe-area-inset-bottom) + var(--bottom-nav-h) + 94px);
      display:flex; justify-content:center; z-index:120; pointer-events:none;
    }
    .toast{
      pointer-events:auto;
      max-width:min(92vw, 420px);
      padding:10px 12px; border-radius:12px;
      background:rgba(14,18,31,.95);
      border:1px solid rgba(255,255,255,.1);
      color:#eef3ff; box-shadow:var(--shadow);
      font-weight:700; font-size:13px;
      opacity:0; transform:translateY(10px);
      transition:.18s ease;
    }
    .toast.show{opacity:1; transform:translateY(0)}
    .muted{color:var(--muted)}
    .hidden{display:none!important}
    .sr{position:absolute;left:-9999px}
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand" title="Trang Truyện">
        <div class="brand-logo"></div>
        <div class="brand-name">Trang <span>Truyện</span></div>
      </div>

      <button class="icon-btn" id="btnMenu" title="Menu" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 7h16M4 12h16M4 17h16"/>
        </svg>
      </button>

      <button class="pill" id="onlinePill" title="Online">
        <span style="width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px rgba(0,212,255,.8)"></span>
        <span id="onlineCount">0</span>
      </button>

      <button class="icon-btn" id="btnSearch" title="Tìm kiếm" aria-label="Tìm kiếm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-3.5-3.5"></path>
        </svg>
      </button>

      <button class="pill gold" id="btnNap" title="Nạp">
        <span class="coin"></span> Nạp
      </button>

      <button class="icon-btn" id="btnTheme" title="Chế độ tối">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a1 1 0 0 1 .82 1.57A7 7 0 0 0 19.43 12a1 1 0 0 1 1.57.8z"/>
        </svg>
      </button>

      <button class="icon-btn" id="btnNotify" title="Thông báo">
        <span class="badge-dot" id="notifyBadge">43</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"/>
          <path d="M9 17a3 3 0 0 0 6 0"/>
        </svg>
      </button>

      <div class="avatar-wrap" id="btnAccount" title="Tài khoản">
        <div class="avatar" id="avatarBox">?</div>
        <svg class="caret" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
      </div>
    </div>
  </header>

  <main class="app">
    <div class="page">

      <!-- USER / AUTH PANEL -->
      <section class="section">
        <div class="panel auth-panel">
          <div class="auth-left">
            <div class="avatar" id="profileAvatar">?</div>
            <div class="auth-text">
              <div class="name" id="profileName">Khách</div>
              <div class="sub" id="profileSub">Đăng nhập để đồng bộ theo dõi / lịch sử đọc bằng Firebase</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
            <button class="btn" id="btnLogin">Đăng nhập Google</button>
            <button class="btn hidden" id="btnLogout">Đăng xuất</button>
          </div>
        </div>
      </section>

      <!-- ĐANG ĐỌC -->
      <section class="section">
        <div class="section-head">
          <div class="section-title">
            <div class="bubble">🕘</div>
            <div>Đang Đọc</div>
          </div>
          <button class="btn-link" id="viewAllReading">Xem tất cả →</button>
        </div>
        <div class="h-scroll" id="readingStrip"></div>
      </section>

    function esc(s=""){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }

    function formatShort(n=0){
      n = Number(n)||0;
      if (n >= 1e9) return (n/1e9).toFixed(1).replace(".0","") + "B";
      if (n >= 1e6) return (n/1e6).toFixed(1).replace(".0","") + "M";
      if (n >= 1e3) return (n/1e3).toFixed(1).replace(".0","") + "K";
      return String(n);
    }

    function initials(name="Khách"){
      const parts = name.trim().split(/\s+/).slice(0,2);
      return parts.map(p=>p[0]?.toUpperCase()||"").join("") || "?";

      return stories.find(s => s.id === id);

      return userState.followedIds.includes(id);

      return userState.historyIds.includes(id);

        .filter(Boolean);
      if (fromHistory.length) return fromHistory.slice(0, 10);

      return sortedUpdatedStories().slice(0, 10);

        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr.slice(0, count);

    /* ============================
       9) User state sync (Firestore)
       users/{uid}:
       {
         displayName, email, photoURL, createdAt, lastSeenAt,
         followedIds: [],
         historyIds: [],
         lastReading: { storyId: chapterNumber }
       }
       ============================ */
    async function ensureUserDoc(user){
      if (!ENABLE_FIREBASE || !db || !user) return;
      const refUser = doc(db, "users", user.uid);
      await setDoc(refUser, {
        uid: user.uid,
        displayName: user.displayName || "",
        email: user.email || "",
        photoURL: user.photoURL || "",
        lastSeenAt: serverTimestamp(),
        createdAt: serverTimestamp()
      }, { merge: true });
    }

    function startUserStateListener(user){
      if (!ENABLE_FIREBASE || !db || !user) return;
      if (userStateUnsub) userStateUnsub();

      const refUser = doc(db, "users", user.uid);
      userStateUnsub = onSnapshot(refUser, (snap) => {
        const data = snap.data() || {};
        userState = {
          followedIds: Array.isArray(data.followedIds) ? data.followedIds : [],
          historyIds: Array.isArray(data.historyIds) ? data.historyIds : [],
          lastReading: (data.lastReading && typeof data.lastReading === "object") ? data.lastReading : {},
          updatedAt: data.lastSeenAt || null
        };
        renderAll();
      }, (err) => {
        console.error("onSnapshot user error:", err);
        toast("Lỗi đồng bộ dữ liệu người dùng.");
      });
    }

    async function saveUserStatePatch(patch){
      if (!currentUser){
        toast("Đăng nhập để đồng bộ.");
        return false;
      }
      if (!ENABLE_FIREBASE || !db){
        // chạy local nếu chưa bật firebase
        Object.assign(userState, patch);
        renderAll();
        return true;
      }
      try{
        const refUser = doc(db, "users", currentUser.uid);
        await setDoc(refUser, {
          ...patch,
          lastSeenAt: serverTimestamp()
        }, { merge: true });
        return true;
      }catch(err){
        console.error(err);
        toast("Không thể lưu Firebase.");
        return false;
      }
    }

    async function toggleFollowStory(storyId){
      const next = new Set(userState.followedIds);
      if (next.has(storyId)) {
        next.delete(storyId);
      } else {
        next.add(storyId);
      }
      const ok = await saveUserStatePatch({ followedIds: [...next] });
      if (ok){
        toast(next.has(storyId) ? "Đã theo dõi truyện" : "Đã bỏ theo dõi");
        if (currentModalStoryId === storyId){
          modalFollowBtn.classList.toggle("active", next.has(storyId));
          modalFollowBtn.textContent = next.has(storyId) ? "★ Đã theo dõi" : "☆ Theo dõi";
        }
      }
    }

    async function markReadStory(storyId){
      const nextHistory = [storyId, ...userState.historyIds.filter(id => id !== storyId)].slice(0, 50);
      const lastReading = { ...(userState.lastReading || {}), [storyId]: 1 };
      const ok = await saveUserStatePatch({
        historyIds: nextHistory,
        lastReading
      });
      if (ok){
        toast("Đã lưu vào lịch sử đọc");
      }
    }

    /* ============================
       10) Load stories from Firestore
       collection: stories
       ============================ */
    async function loadStories(){
      if (ENABLE_FIREBASE && db){
        try{
          const snap = await getDocs(collection(db, "stories"));
          const arr = [];
          snap.forEach(docSnap => {
            const d = docSnap.data() || {};
            let updatedAtMs = Date.now();
            if (d.updatedAt?.toMillis) updatedAtMs = d.updatedAt.toMillis();
            else if (typeof d.updatedAtMs === "number") updatedAtMs = d.updatedAtMs;

            arr.push({
              id: docSnap.id,
              title: d.title || "Chưa có tên",
              author: d.author || "Chưa rõ",
              cover: d.cover || "https://placehold.co/300x400/1f2235/ffffff?text=No+Cover",
              desc: d.desc || "",
              chapters: Number(d.chapters || 0),
              views: Number(d.views || 0),
              rating: Number(d.rating || 0),
              category: d.category || "",
              status: d.status || "Đang ra",
              updatedAtText: d.updatedAtText || "Mới cập nhật",
              updatedAtMs
            });
          });

          if (arr.length > 0){
            stories = arr;
          } else if (USE_LOCAL_SEED_WHEN_EMPTY){
            stories = localSeedStories;
          } else {
            stories = [];
          }
        } catch (err){
          console.error("loadStories error:", err);
          toast("Lỗi tải truyện từ Firebase, đang dùng dữ liệu test.");
          stories = localSeedStories;
        }
      } else {
        stories = localSeedStories;
      }
      renderAll();
    }

    /* ============================
       11) Realtime Database presence (optional)
       - Hiển thị số online đơn giản
       ============================ */
    function startPresence(user){
      if (!ENABLE_FIREBASE || !rtdb || !user) return;
      try{
        // đánh dấu user online
        const meRef = ref(rtdb, `presence/${user.uid}`);
        set(meRef, {
          online: true,
          name: user.displayName || "User",
          ts: Date.now()
        });
        onDisconnect(meRef).remove?.() ?? onDisconnect(meRef).set({ online: false, ts: Date.now() });

        // đếm online
        const presRef = ref(rtdb, "presence");
        if (presenceUnsub) presenceUnsub();
        presenceUnsub = onValue(presRef, (snap) => {
          const val = snap.val() || {};
          const count = Object.values(val).filter(v => v && v.online !== false).length;
          $("#onlineCount").textContent = count;
        });
      } catch (e){
        console.warn("presence error", e);
      }
    }

    /* ============================
       12) Auth init
       ============================ */
    function initAuth(){
      if (!ENABLE_FIREBASE){
        applyUserUI();
        return;
      }

      onAuthStateChanged(auth, async (user) => {
        currentUser = user || null;
        applyUserUI();

        if (user){
          await ensureUserDoc(user);
          startUserStateListener(user);
          startPresence(user);
        } else {
          if (userStateUnsub) userStateUnsub();
          userStateUnsub = null;
          userState = { followedIds: [], historyIds: [], lastReading: {} };
          $("#onlineCount").textContent = "0";
          renderAll();
        }
      });
    }

    /* ============================
       13) Events
       ============================ */
    document.addEventListener("click", async (e) => {
      const openBtn = e.target.closest(".js-open");
      if (openBtn){
        const id = openBtn.dataset.id || openBtn.closest("[data-story-id]")?.dataset.storyId;
        if (id) openStoryModal(id);
        return;
      }

      const followBtn = e.target.closest("[data-follow]");
      if (followBtn){
        e.stopPropagation();
        const id = followBtn.dataset.follow;
        if (id) await toggleFollowStory(id);
        return;
      }

      const readBtn = e.target.closest("[data-read]");
      if (readBtn){
        e.stopPropagation();
        const id = readBtn.dataset.read;
        if (id){
          await markReadStory(id);
          openStoryModal(id);
        }
        return;
      }

      const itemOpen = e.target.closest(".updated-item");
      if (itemOpen){
        const id = itemOpen.dataset.id;
        if (id) openStoryModal(id);
        return;
      }
    });

    $("#modalCloseBtn").addEventListener("click", closeStoryModal);
    storyModal.addEventListener("click", (e) => {
      if (e.target === storyModal) closeStoryModal();
    });

    modalReadBtn.addEventListener("click", async () => {
      if (!currentModalStoryId) return;
      await markReadStory(currentModalStoryId);
      toast("Mở trang đọc (bạn nối sang route /reader sau)");
      // TODO: chuyển trang đọc:
      // location.href = `reader.html?id=${encodeURIComponent(currentModalStoryId)}`
    });

    modalFollowBtn.addEventListener("click", async () => {
      if (!currentModalStoryId) return;
      await toggleFollowStory(currentModalStoryId);
    });

    $("#btnRandomPick").addEventListener("click", () => {
      renderRandomGrid();
      toast("Đã chọn truyện ngẫu nhiên mới");
    });

    $("#btnSearch").addEventListener("click", () => toast("Bạn có thể làm thêm trang tìm kiếm riêng (#/search)"));
    $("#btnNap").addEventListener("click", () => toast("Nút nạp - nối Firebase/Payment sau"));
    $("#btnNotify").addEventListener("click", () => toast("Danh sách thông báo"));
    $("#btnTheme").addEventListener("click", () => toast("Hiện đang giao diện tối"));
    $("#btnMenu").addEventListener("click", () => toast("Menu trái / drawer (bạn có thể thêm sau)"));
    $("#btnBag").addEventListener("click", () => toast("Mở Hành trang"));
    $("#btnMissions").addEventListener("click", () => toast("Mở Nhiệm vụ"));

    $$(".nav-item").forEach(el=>{
      el.addEventListener("click", ()=>{
        $$(".nav-item").forEach(n=>n.classList.remove("active"));
        el.classList.add("active");
        toast("Tab: " + (el.dataset.tab || ""));
      });
    });

    $("#centerHome").addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    $("#btnAccount").addEventListener("click", () => {
      if (currentUser) toast(currentUser.email || "Đã đăng nhập");
      else toast("Bạn chưa đăng nhập");
    });

    btnLogin.addEventListener("click", async () => {
      if (!ENABLE_FIREBASE){
        toast("Hãy bật ENABLE_FIREBASE = true và dán config Firebase");
        return;
      }
      try{
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        toast("Đăng nhập thành công");
      }catch(err){
        console.error(err);
        toast("Đăng nhập thất bại");
      }
    });

    btnLogout.addEventListener("click", async () => {
      if (!ENABLE_FIREBASE || !auth) return;
      try{
        await signOut(auth);
        toast("Đã đăng xuất");
      }catch(err){
        console.error(err);
        toast("Đăng xuất thất bại");
      }
    });

    // pseudo cooldown text
    (function startFakeCooldown(){
      let t = 55;
      setInterval(()=>{
        t--;
        if (t <= 0) t = 55;
        $("#randomCooldownText").textContent = t + "s";
      }, 1000);
    })();

    /* ============================
       14) Init
       ============================ */
    async function init(){
      applyUserUI();
      await loadStories();
      initAuth();

      // số online giả khi chưa bật Firebase
      if (!ENABLE_FIREBASE){
        $("#onlineCount").textContent = "9";
      }
    }
    init();
  </script>
</body>
</html>
