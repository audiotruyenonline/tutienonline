<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Đọc & Nghe Truyện Chữ</title>
  <meta name="theme-color" content="#0b0f14" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" id="btnDrawer" aria-label="Menu">☰</button>
        <a class="brand" href="#/home">📖 Truyện Online</a>
      </div>

      <div class="topbar-center">
        <div class="searchbox">
          <span class="search-ico">⌕</span>
          <input id="topSearch" placeholder="Tìm truyện, tác giả, tag..." autocomplete="off" />
        </div>
      </div>

      <div class="topbar-right">
        <button class="chip" id="btnTheme" title="Sáng/Tối">🌙</button>
        <button class="chip" id="btnLogin" title="Đăng nhập">Đăng nhập</button>
        <button class="avatar-btn hide" id="btnProfile" title="Hồ sơ">
          <img id="avatarImg" alt="avatar" />
        </button>
      </div>
    </header>

    <aside class="drawer hide" id="drawer">
      <div class="drawer-head">
        <div class="drawer-title">Danh mục</div>
        <button class="icon-btn" id="btnCloseDrawer" aria-label="Close">✕</button>
      </div>
      <nav class="drawer-nav">
        <a href="#/home">🏠 Trang chủ</a>
        <a href="#/bookshelf">📚 Tủ sách</a>
        <a href="#/search">🔎 Tìm kiếm</a>
        <a href="#/community">💬 Cộng đồng</a>
        <a href="#/profile">👤 Cá nhân</a>
      </nav>
      <div class="drawer-foot">
        <div class="muted small">
          Mặc định DARK MODE. Nội dung truyện/ảnh nằm ở 20 CONTENT projects.
        </div>
      </div>
    </aside>

    <main id="view" class="view"></main>

    <!-- Mini Player (ẩn/hiện theo scroll) -->
    <section id="miniPlayer" class="mini-player hide">
      <div class="mp-left">
        <div class="mp-title" id="mpTitle">—</div>
        <div class="mp-sub" id="mpSub">—</div>
      </div>

      <div class="mp-controls">
        <button class="icon-btn" id="mpPrev" title="Chương trước">⟨</button>
        <button class="icon-btn mp-play" id="mpPlay" title="Play/Pause">▶</button>
        <button class="icon-btn" id="mpNext" title="Chương sau">⟩</button>
      </div>

      <div class="mp-speed">
        <div class="mp-speed-row">
          <span class="small muted">Tốc độ</span>
          <span class="mp-speed-val" id="mpSpeedVal">1.0x</span>
        </div>
        <input id="mpSpeed" type="range" min="0.5" max="5.0" step="0.1" value="1.0" />
      </div>
    </section>

    <!-- Bottom Nav (mobile-first) -->
    <nav class="bottom-nav">
      <a data-nav="home" href="#/home">🏠<span>Home</span></a>
      <a data-nav="bookshelf" href="#/bookshelf">📚<span>Tủ sách</span></a>
      <a data-nav="search" href="#/search">🔎<span>Tìm</span></a>
      <a data-nav="community" href="#/community">💬<span>Cộng đồng</span></a>
      <a data-nav="profile" href="#/profile">👤<span>Cá nhân</span></a>
    </nav>

    <div id="toastHost" class="toast-host"></div>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
